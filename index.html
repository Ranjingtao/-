<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>时光记事本 — 记录每一段珍贵时光</title>
  <meta name="description" content="记录纪念日，追踪过去的天数，写下每一天的故事。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ 顶部导航栏 ============ -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-icon">📅</span>
        <span class="brand-name">时光记事本</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-add-event" title="添加新的纪念日">
          <span class="btn-icon">＋</span>
          <span class="btn-text">添加纪念日</span>
        </button>
        <button class="btn-icon-only theme-toggle" id="theme-toggle" title="切换亮色/暗色主题">
          🌙
        </button>
      </div>
    </div>
  </header>

  <!-- ============ 主内容区 ============ -->
  <main class="main" id="main">

    <!-- 统计卡片区 -->
    <section class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">纪念日总数</div>
        <div class="stat-icon">📌</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-number" id="stat-longest">0</div>
        <div class="stat-label">最久纪念日</div>
        <div class="stat-icon">🏆</div>
      </div>
      <div class="stat-card accent2">
        <div class="stat-number" id="stat-total-diary">0</div>
        <div class="stat-label">日记篇数</div>
        <div class="stat-icon">📝</div>
      </div>
    </section>

    <!-- 列表视图 -->
    <section class="event-list" id="event-list">
      <!-- 由 JS 动态渲染 -->
    </section>

    <!-- 空状态 -->
    <div class="empty-state" id="empty-state">
      <span class="empty-icon">📅</span>
      <h2>还没有纪念日</h2>
      <p>点击上方「添加纪念日」按钮，开始记录你的珍贵时光吧！</p>
      <button class="btn btn-primary btn-lg" onclick="document.getElementById('btn-add-event').click()">
        ✨ 创建第一个纪念日
      </button>
    </div>

  </main>

  <!-- ============ 弹窗：添加/编辑纪念日 ============ -->
  <div class="modal-overlay" id="modal-event">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-event-title">添加纪念日</h3>
        <button class="btn-close" id="btn-close-event" aria-label="关闭">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="event-name">名称 <span class="required">*</span></label>
          <input type="text" id="event-name" placeholder="例如：恋爱纪念日、宝宝出生…" maxlength="30" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="event-date">起始日期 <span class="required">*</span></label>
          <input type="date" id="event-date">
        </div>
        <div class="form-group">
          <label for="event-type">类型</label>
          <select id="event-type">
            <option value="since">从那天至今（倒数日）</option>
            <option value="until">距离那天还有（正数日）</option>
          </select>
        </div>
        <div class="form-group">
          <label for="event-color">标签颜色</label>
          <div class="color-picker" id="color-picker">
            <span class="color-dot active" data-color="#6366f1" style="background:#6366f1"></span>
            <span class="color-dot" data-color="#ec4899" style="background:#ec4899"></span>
            <span class="color-dot" data-color="#f59e0b" style="background:#f59e0b"></span>
            <span class="color-dot" data-color="#10b981" style="background:#10b981"></span>
            <span class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></span>
            <span class="color-dot" data-color="#ef4444" style="background:#ef4444"></span>
            <span class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></span>
            <span class="color-dot" data-color="#14b8a6" style="background:#14b8a6"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="event-note">备注</label>
          <textarea id="event-note" rows="2" placeholder="可选的简短描述…" maxlength="100"></textarea>
        </div>
        <input type="hidden" id="event-id">
        <input type="hidden" id="event-color-val" value="#6366f1">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancel-event">取消</button>
        <button class="btn btn-danger btn-sm" id="btn-delete-event" style="display:none">删除</button>
        <button class="btn btn-primary" id="btn-save-event">保存</button>
      </div>
    </div>
  </div>

  <!-- ============ 弹窗：日记详情 ============ -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal modal-detail">
      <div class="modal-header">
        <div class="modal-header-left">
          <h3 id="detail-title">纪念日详情</h3>
          <span class="detail-badge" id="detail-badge"></span>
        </div>
        <button class="btn-close" id="btn-close-detail" aria-label="关闭">✕</button>
      </div>
      <div class="modal-body">
        <!-- 大数字显示 -->
        <div class="detail-hero">
          <div class="detail-number" id="detail-days">0</div>
          <div class="detail-unit" id="detail-unit">天</div>
          <div class="detail-subtitle" id="detail-subtitle"></div>
        </div>

        <!-- 日记录入区 -->
        <div class="diary-input-area">
          <h4>📝 每日记录</h4>
          <div class="diary-form">
            <input type="date" id="diary-date" class="diary-date-input">
            <textarea id="diary-content" rows="2" placeholder="今天发生了什么？记录下来吧…" maxlength="500"></textarea>
            <button class="btn btn-primary btn-sm" id="btn-add-diary">添加记录</button>
          </div>
        </div>

        <!-- 日记列表 -->
        <div class="diary-list" id="diary-list">
          <!-- 由 JS 动态渲染 -->
        </div>
      </div>
    </div>
  </div>

  <!-- ============ 弹窗：确认删除 ============ -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal modal-sm">
      <div class="modal-body" style="text-align:center">
        <p id="confirm-msg" style="font-size:1.05rem;margin-bottom:1.2rem;">确定要删除吗？此操作不可撤销。</p>
        <div style="display:flex;gap:0.75rem;justify-content:center">
          <button class="btn btn-ghost" id="btn-confirm-no">取消</button>
          <button class="btn btn-danger" id="btn-confirm-yes">确定删除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
